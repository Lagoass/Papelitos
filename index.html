<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Papelito" />
    <title>Papelito</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script>
      // Aplica tema salvo o mais cedo possível — antes do bundle carregar.
      // Sem isso, o Android pode "travar" a cor da safe-area no theme-color
      // padrão (#000000) na primeira renderização, criando uma linha visível
      // entre safe-area preta e body colorido em temas não-preto.
      (function () {
        try {
          var THEMES = {
            mono:      '#000000',
            synthwave: '#0f0820',
            minimal:   '#09090b',
            casino:    '#052e16',
            junina:    '#1c0a0a',
            light:     '#fef9f0',
          }
          var id = localStorage.getItem('papelito_theme') || 'mono'
          var bg = THEMES[id] || THEMES.mono
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', bg)
          document.documentElement.classList.add('theme-' + id)
          document.documentElement.style.backgroundColor = bg
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
